name: moviroo_driver_app
description: "A new Flutter project."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  cupertino_icons: ^1.0.8
  video_player: ^2.9.2
  shared_preferences: ^2.2.2
  provider: ^6.1.1
  easy_localization: ^3.0.0
  firebase_core: ^4.5.0
  firebase_messaging: 16.1.2
  flutter_local_notifications: ^18.0.1
  image_picker: ^1.0.7
  flutter_sound: ^9.2.13 # replaces record — proper namespace, works with modern AGP
  just_audio: ^0.9.40
  path_provider: ^2.1.3
  permission_handler: ^11.3.1 # needed for mic permission with flutter_sound

  # ── API & Networking ─────────────────────────────────────
  dio: ^5.7.0
  pretty_dio_logger: ^1.4.0

  # ── Secure Token Storage ─────────────────────────────────
  flutter_secure_storage: ^9.2.2

  # ── JSON Serialization ───────────────────────────────────
  json_annotation: ^4.9.0

  # ── GPS / Location ────────────────────────────────────────
  geolocator: ^13.0.4
  location: ^8.0.0

  # ── Map ───────────────────────────────────────────────────
  maplibre_gl: ^0.25.0

  # ── Deep linking / Phone dialer ──────────────────────────
  url_launcher: ^6.3.1

  # ── WebSocket (GPS streaming) ─────────────────────────────
  socket_io_client: ^2.0.3+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7
  flutter_lints: ^6.0.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "images/icon_luncher/Driver/Driver1.png" # ← change this
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "images/icon_luncher/Driver/Driver1.png" # ← change this

flutter_native_splash:
  color: "#ffffff"
  image: images/logo6.png
  android: true
  ios: true
  android_gravity: center
  ios_content_mode: scaleAspectFit
  fullscreen: true
  android_12:
    color: "#ffffff"
    image: images/logo6.png

flutter:
  uses-material-design: true
  generate: true
  assets:
    - images/logo6.png
    - images/google.png
    - images/apple.png
